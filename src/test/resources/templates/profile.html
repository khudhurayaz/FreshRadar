<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta th:name="${author}" th:content="${authorDescription}">
    <title th:text="${appName + ' | Profile'}"></title>
    <link th:href="${cssPath}" rel="stylesheet">
    <link rel="icon" type="image/x-icon" th:href="${appIcon}">
    <link rel="stylesheet" th:href="@{/assets/style/master.css}">
    <link rel="stylesheet" th:href="@{/assets/style/profile.css}">
    <link rel="stylesheet" th:href="@{/assets/style/mobile.css}">

    <!-- Externe styles -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="static-nav-page">
<div th:replace="~{site/navigation::Menu(extraClass='navbar-scrolled')}"></div>

<section class="profile-section">
    <div class="container">
        <div class="row mobileAnsichtButtonProfile m-3 pt-5">
            <div class="col-6" th:if="${isOwner}">
                <a class="btn btn-outline-dark w-100 display-4 btn-text-color" th:href="@{/dashboard}">Dashboard</a>
            </div>
            <div class="col-6 text-end" th:if="${isOwner}">
                <a class="btn btn-outline-dark w-100 btnOutline fs-6 btn-text-color" th:href="@{/setting}">Einstellung</a>
            </div>
        </div>
        <div class="row mobileAnsichtButtonProfile m-3">
            <div class="col-6" th:if="${isAdmin && !isOwner}">
                <a class="btn btn-outline-dark btnOutline w-25 btn-text-color" onclick="history.back()">Zurück</a>
            </div>
        </div>
        <div class="row align-items-center justify-content-center my-5 mx-5">
            <div class="col-lg-3 col-md-5 text-center profileImage">
                <img th:src="@{${profile.profileImage != null ? profile.profileImage : '/assets/images/profile/default/defaultProfile.png'}}"
                     th:alt="${'Profil von ' + profile.firstname + ' ' + profile.lastname}">
            </div>
            <div class="col-lg-4 col-md-7">
                <h1 th:text="${(profile.firstname == null ? 'Unbekannt' : profile.firstname)
                + ' ' + (profile.lastname == null ? 'Unbekannt' : profile.lastname)}"></h1>
                <h4 th:text="${(profile.area == null ? 'Unbekannt' : profile.area)}" style="color:#4DB258;" ></h4>
                <p th:text="${profile.info == null ? 'Keine informationen vorhanden!' : profile.info}"></p>
                <div class="d-flex align-items-center gap-3 map">
                    <img th:src="@{/assets/images/icons/icons8/map.png}" alt="map">
                    <span th:text="${profile.location == null ? 'Unbekannt' : profile.location}"></span>
                </div>
                <div class="buttonBtn">
                    <form th:if="${isOwner}" th:action="@{/profile/edit}" method="get">
                        <button type="submit" class="profileButton">
                            Profile bearbeiten
                        </button>
                    </form>
                </div>
            </div>
            <div class="col-lg-5">
                <div class="profileInfo align-content-start">
                    <div class="row">
                        <div class="col-lg-4 profileInfoImage">
                            <img th:src="@{/assets/images/icons/icons8/features/account.png}"  alt="Account">
                        </div>
                        <div class="col-lg-8">
                            <h2>Profile Information</h2>
                        </div>
                    </div>
                    <div class="info-hr-ueberschrift"></div>
                    <div class="info-row mt-5">
                        <img th:src="@{/assets/images/icons/icons8/mail.png}"  alt="" width="32">
                        <div class="info-label">Email Address</div>
                        <div class="info-value info-script" th:text="${isOwner ? profile.user.email : 'Du bist nicht der Besitzer!'}"></div>
                    </div>
                    <div class="info-hr"></div>
                    <div class="info-row">
                        <img th:src="@{/assets/images/icons/icons8/krone.png}"  alt="" width="32">
                        <div class="info-label">Subscription</div>
                        <div class="info-value">
                            <div class="row text-center justify-content-end d-flex flex-column">
                                <a class="plan-badge text-white"
                                   th:if="${isOwner}"
                                   th:href="@{/subscription}"
                                   th:text="${(profile.user.subscription.planType.substring(0, 1).toUpperCase() + profile.user.subscription.planType.substring(1)) + ' Plan'}">
                                </a>

                                <span class="plan-badge text-white"
                                      th:unless="${isOwner}"
                                      th:style="'cursor:default;'"
                                      th:text="${(profile.user.subscription.planType.substring(0, 1).toUpperCase() + profile.user.subscription.planType.substring(1)) + ' Plan'}">
                                </span>
                                <span th:text="${aboPausiert ? 'Abo ist Pausiert' : (aboBeendet ? 'Abo ist Beendet' : '')}"
                                      th:class="${aboPausiert ? 'text-warning' : (aboBeendet ? 'text-danger' : '')}"></span>
                            </div>
                        </div>
                    </div>
                    <div class="info-hr"></div>
                    <div class="info-row">
                        <img th:src="@{/assets/images/icons/icons8/kalendar.png}"  alt="" width="32">
                        <div class="info-label">Last Login</div>
                        <div class="info-value info-script" th:text="${isOwner ? profile.user.lastLoginAt : 'Darf ich nicht anzeigen!'}"></div>
                    </div>
                    <div class="info-hr"></div>
                    <div class="info-row">
                        <img th:src="@{/assets/images/icons/icons8/box.png}" alt="" width="32">
                        <div class="info-label">Produkte</div>
                        <div class="info-value info-script fs-4 pointer">
                            <a class="text-white"
                               th:text="${products}"
                               th:if="${isOwner}"
                               th:href="${products >= 1 ? '/dashboard?tab=bestandsverwaltung' : ''}"></a>
                            <span class="text-white"
                                  th:text="${products}"
                                  th:style="'cursor:default;'"
                                  th:unless="${isOwner}">
                            </span>
                        </div>
                    </div>
                    <div class="info-hr"></div>
                </div>
            </div>
        </div>
    </div>

</section>

<!-- Lade Kontakt section -->
<div th:replace="~{/site/footer :: Footer}"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/assets/js/index.js}"></script>
</body>
</html>
