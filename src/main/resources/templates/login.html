<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta th:name="${author}" th:content="${authorDescription}">
    <title th:text="${appName + ' | Login'}"></title>
    <link th:href="${cssPath}" rel="stylesheet">
    <link th:href="${mobilePath}" rel="stylesheet">
    <link rel="icon" type="image/x-icon" th:href="${appIcon}">

    <!-- Externe styles -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

</head>
<body class="static-nav-page">
<div th:replace="~{site/navigation::Menu(extraClass='navbar-scrolled')}"></div>

<div class="login-page container-fluid d-flex">

    <div class="col-md-6 d-none d-md-flex align-items-center justify-content-center" style="background-color: #0F172A;">
        <div class="logo-wrapper">
            <img th:src="@{/assets/images/icons/app/FreshRadar.png}"
                 class="logo-img" alt="FreshRadar Logo">
            <img th:src="@{/assets/images/icons/icons8/user/login.png}"
                 class="user-icon" alt="User Icon">
        </div>
    </div>

    <div class="col-12 col-md-6 d-flex align-items-center justify-content-center py-5">
        <div class="login-card">

            <div class="text-center mb-4">
                <h1 class="h2 mb-2 fw-bold">Willkommen zurück <br> bei <span>FreshRadar</span></h1>
                <p class="opacity-75">Dein smarter Bestandsmanager wartet auf dich.</p>
            </div>

            <div th:if="${param.error}" class="alert alert-warning bg-transparent border-danger small" role="alert">
                <span>Ungültige E-Mail oder Passwort.</span>
            </div>

            <form th:action="@{/login}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

                <div class="mb-3">
                    <label for="email" class="form-label small">E-Mail</label>
                    <input type="email" class="form-control" id="email" name="username" required autocomplete="email" placeholder="name@beispiel.de">
                </div>

                <div class="mb-4">
                    <label for="password" class="form-label small">Passwort</label>
                    <div class="input-group">
                        <input type="password" class="form-control" id="password" name="password" required autocomplete="current-password" placeholder="••••••••">
                        <button class="btn btn-outline-secondary" type="button" id="toggle-password" aria-label="Passwort anzeigen">
                            <i class="fa-regular fa-eye"></i>
                        </button>
                    </div>
                </div>

                <button type="submit" class="btn btn-custom w-100">Einloggen</button>
            </form>

            <div class="text-center mt-4 border-top border-secondary pt-3">
                <p class="small opacity-75">Neu bei FreshRadar? <a th:href="@{/register}" class="text-link">Konto erstellen</a></p>
            </div>

        </div>
    </div>
</div>

<!-- Lade Kontakt section -->
<div th:replace="~{site/footer :: Footer}"></div>


<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/assets/js/index.js}"></script>
<script>
    document.getElementById('toggle-password')?.addEventListener('click', function () {
        const input = document.getElementById('password');
        const icon = this.querySelector('i');
        const isPassword = input.type === 'password';
        input.type = isPassword ? 'text' : 'password';
        icon.classList.toggle('fa-eye');
        icon.classList.toggle('fa-eye-slash');
        this.setAttribute('aria-label', isPassword ? 'Passwort verbergen' : 'Passwort anzeigen');
    });
</script>
</body>
</html>
