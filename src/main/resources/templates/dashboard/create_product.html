<section th:fragment="create" class="create">
    <div class="mb-4">
        <h1>Neues Produkt hinzufügen</h1>
    </div>
    <form class="row g-3">
        <div class="row justify-content-center align-items-center flex">
            <div class="col-5">
                <label for="inputProduct" class="form-label">Produktname</label>
                <input type="text" class="form-control" id="inputProduct" placeholder="Wie heißt ihr Produkt?" required>
            </div>
            <div class="col-5">
                <label for="inputUnit" class="form-label">Einheit</label>
                <input type="text" class="form-control" id="inputUnit" placeholder="Welche Einheit hat ihr Produkt?" required>
            </div>
            <div class="col-2">
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" id="gridCheck">
                    <label class="form-check-label" for="gridCheck">
                        Produkt geöffnet?
                    </label>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <label for="inputStatelagerort" class="form-label">Lagerort</label>
            <select id="inputStatelagerort" class="form-select" name="locationId">

                <option th:if="${allLocations.isEmpty()}" disabled value="" selected>
                    Lagerort darf nicht leer sein, füge einen neuen Lagerort hinzu!
                </option>

                <option th:unless="${allLocations.isEmpty()}" value="" selected>
                    Bitte Lagerort auswählen...
                </option>

                <option th:each="location : ${allLocations}"
                        th:value="${location.locationId}"
                        th:text="${location.location}">
                </option>
            </select>
        </div>
        <div class="col-md-4">
            <label for="inputState" class="form-label">Kategorie</label>
            <select id="inputState" class="form-select" name="categorieId">
                <option th:if="${allCategories.isEmpty()}" disabled value="" selected>
                    Kategorie darf nicht leer sein, füge eine neue Kategorie hinzu!
                </option>

                <option th:unless="${allCategories.isEmpty()}" value="" selected>
                    Bitte Kategorie auswählen...
                </option>

                <option th:each="categorie : ${allCategories}"
                        th:value="${categorie.id}"
                        th:text="${categorie.name}">
                </option>
            </select>
        </div>
        <div class="col-md-4">
            <label for="inputDate" class="form-label">Ablaufdatum:</label>
            <input type="date" id="inputDate" class="form-control" name="expiryDate" required>
        </div>
        <hr>
        <div class="row">
            <h4>Soll-Ist-Bedarf: </h4>
            <div class="col-md-6">
                <label for="inputSoll" class="form-label">Soll:</label>
                <input type="number" id="inputSoll" class="form-control" name="inputSoll" placeholder="Wie viel sollte vorhanden sein..." required>
            </div>
            <div class="col-md-6">
                <label for="inputIst" class="form-label">Ist:</label>
                <input type="number" id="inputIst" class="form-control" name="inputIst" placeholder="Wie viel ist es noch da?" required>
            </div>
        </div>
        <div class="col-12">
            <button type="submit" id="submit" class="btn btn-secondary w-100 btnAddNewProduct">Produkt hinzufügen</button>
        </div>
    </form>
</section>
