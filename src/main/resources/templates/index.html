<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.w3.org/1999/xhtml" lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta th:name="${author}" th:content="${authorDescription}">
    <title th:text="${appName}"></title>
    <link th:href="${cssPath}" rel="stylesheet">
    <link th:href="${mobilePath}" rel="stylesheet">
    <link rel="icon" type="image/x-icon" th:href="${appIcon}">

    <!-- Externe styles -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>

    <!-- Lade Menü -->
    <div th:replace="~{/site/navigation :: Menu}"></div>

    <!-- Lade Hero section -->
    <div th:replace="~{/site/home :: Hero}" ></div>

    <!-- Lade Feature section-->
    <div id="features"></div>
    <div th:replace="~{/site/features :: Features}"></div>

    <!-- Lade Preis section -->
    <div id="price"></div>
    <div th:if="${#authorization.expression('isAuthenticated()')}">
        <div th:replace="~{/site/price :: Price(isSelectionPage=true)}"></div>
    </div>

    <div th:if="${#authorization.expression('!isAuthenticated()')}">
        <div th:replace="~{/site/price :: Price(isSelectionPage=false)}"></div>
    </div>

    <!-- Lade Kontakt section -->
    <div id="contact"></div>
    <div th:replace="~{/site/contact :: Contact}"></div>

    <!-- Lade Kontakt section -->
    <div id="footer"></div>
    <div th:replace="~{/site/footer :: Footer}"></div>

    <div id="alert"></div>

    <!-- JavaScript -->
    <script th:src="@{/assets/js/index.js}"></script>
    <script th:type="module" th:src="${jsContactPath}"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
