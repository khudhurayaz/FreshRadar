<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta th:name="${author}" th:content="${authorDescription}">
    <title th:text="${appName + ' | Profile'}"></title>
    <link th:href="${cssPath}" rel="stylesheet">
    <link rel="icon" type="image/x-icon" th:href="${appIcon}">
    <link rel="stylesheet" th:href="@{/assets/style/master.css}">
    <link rel="stylesheet" th:href="@{/assets/style/mobile.css}">

    <!-- Externe styles -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="static-nav-page">
<div th:replace="~{site/navigation::Menu(extraClass='navbar-scrolled')}"></div>

<section class="container-xl w-100 subscription">
    <div class="subscription">
        <h1 class="mt-8">Aboverwalten!</h1>
        <form th:action="@{/subscription}" method="post" class="m-0">
            <p>
                Abo Status: <span th:text="${planStatus}" th:class="${planStatus == 'PAUSE' ? 'planStatusPaused' : 'planStatus'}"></span>
            </p>
            <div class="row">
                <div class="col-12 col-lg-4">
                    <a th:href="@{/profile}" class="btn btn-primary w-35 text-start text-white border-0 my-2">
                        Profile
                    </a>
                    <button
                        id="reactiveOrDeactivate"
                        class="btn w-35 text-start border-0 my-2"
                        th:data-user-id="${userId}"
                        th:data-subscription-id="${subscriptionId}"
                        th:text="${planStatus == 'active' ? 'Deaktivieren' : 'Reaktivieren'}"
                        th:classappend="${planStatus == 'active' ? 'btn-warning' : 'btn-success'}"
                    >
                    </button>
                    <button
                        id="upgradePlanOrDowngrade"
                        class="btn w-35 text-start border-0 my-2"
                        th:data-user-id="${userId}"
                        th:data-subscription-id="${subscriptionId}"
                        th:data-status="${planStatus}"
                        th:text="${planType == 'pro' ? 'Downgrade auf Basic' : 'Upgrad auf Pro'}"
                        th:classappend="${planType == 'pro' ? 'btn-info' : 'btn-success'}"
                    >

                    </button>
                    <button
                            id="cancel"
                            type="button"
                            class="btn btn-danger w-35 text-start border-0"
                            th:data-user-id="${userId}"
                            th:data-subscription-id="${subscriptionId}">
                        Kündigen
                    </button>
                </div>
            </div>
        </form>
    </div>
</section>


<!-- Lade Kontakt section -->
<div th:replace="~{site/footer :: Footer}"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/assets/js/index.js}"></script>
<script th:src="@{/assets/js/subscription.js}"></script>
</body>
</html>
