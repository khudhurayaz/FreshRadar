<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fehler</title>
  <link rel="stylesheet" th:href="@{/assets/style/master.css}">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body th:data-status="${status}" th:data-path="${path}" th:data-message="${message}">
<div class="container-fluid error-container">
  <div class="error-content animate__animated animate__fadeInDown">
    <div class="error-code" id="errorCode">-</div>
    <h1 class="mb-4" id="errorTitle">Fehler</h1>
    <p class="mb-4 text-danger" id="errorText">Ein Fehler ist aufgetreten.</p>

    <div class="alert alert-secondary bg-dark text-white border-0 opacity-50" style="font-size: 0.8rem;">
      Pfad: <span id="errorPath">/unbekannt</span>
    </div>

    <div class="mt-5">
      <a href="/" class="btn-custom">Zurück zur Startseite</a>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/assets/js/index.js}"></script>
<script th:src="@{/assets/js/error.js}"></script>
</body>
</html>
