<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta th:name="${author}" th:content="${authorDescription}">
    <title th:text="${appName + ' | Login'}"></title>
    <link th:href="${cssPath}" rel="stylesheet">
    <link th:href="${mobilePath}" rel="stylesheet">
    <link rel="icon" type="image/x-icon" th:href="${appIcon}">

    <!-- Externe styles -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="static-nav-page">
<div th:replace="~{site/navigation::Menu(extraClass='navbar-scrolled')}"></div>

<div class="login-page container-fluid d-flex justify-content-center align-items-center min-vh-100 w-100">

    <div class="col-md-6 d-none d-md-flex align-items-center justify-content-center" style="background-color: #0F172A;">

        <div class="logo-wrapper">

            <img th:src="@{/assets/images/icons/app/FreshRadar.png}"
                 class="logo-img" alt="FreshRadar Logo">

            <img th:src="@{/assets/images/icons/icons8/user/create.png}"
                 class="user-icon" alt="User Icon">

        </div>

    </div>

    <div class="col-12 col-md-6 d-flex align-items-center justify-content-center py-5">
        <div class="login-card">

            <div class="text-center mb-4">

                <h1 class="h3 mb-2 fw-bold">Werde Teil von <span>FreshRadar</span></h1>
                <p class="opacity-75">Vorausschauend planen, Ressourcen schonen, Geld sparen.</p>
            </div>

            <div th:if="${error}" class="alert alert-warning p-2 small" role="alert">
                <span th:text="${error}"></span>
            </div>

            <form th:action="@{/register}" method="post">
                <div class="mb-3">
                    <label for="email" class="form-label small">E-Mail</label>
                    <input type="email" class="form-control" id="email" name="email"
                           th:value="${email}" required placeholder="name@example.com">
                </div>

                <div class="mb-4">
                    <div>
                        <label for="password" th:classappend="${errorPasswort} ? 'form-label small text-danger fw-bold' : 'form-label small'">Passwort</label>
                        <div class="input-group">
                            <input type="password"
                                   th:classappend="${errorPasswort} ? 'form-control bg-danger fw-bold' : 'form-control'"
                                   id="password"
                                   name="password"
                                   placeholder="••••••••"
                                   minlength="12"
                                   th:value="${password}"
                                   required>
                            <button class="btn btn-outline-secondary" type="button" id="toggle-password" aria-label="Passwort anzeigen">
                                <i class="fa-regular fa-eye"></i>
                            </button>
                        </div>
                    </div>
                    <span class="passwortRegeln">
                        <ul>
                            <li th:classappend="${errorLength} ? 'text-danger fw-bold' : ''" th:text="${errorLength} ?: 'Mindestens 12 Zeichen'">Mindestens 12 Zeichen</li>
                            <li th:classappend="${errorUpper} ? 'text-danger fw-bold' : ''" th:text="${errorUpper} ?: 'Mindestens 1 Großbuchstabe'">Mindestens 1 Großbuchstabe</li>
                            <li th:classappend="${errorLower} ? 'text-danger fw-bold' : ''" th:text="${errorLower} ?: 'Mindestens 1 Kleinbuchstabe'">Mindestens 1 Kleinbuchstabe</li>
                            <li th:classappend="${errorDigit} ? 'text-danger fw-bold' : ''" th:text="${errorDigit} ?: 'Mindestens 1 Ziffer'">Mindestens 1 Ziffer</li>
                            <li th:classappend="${errorSpecial} ? 'text-danger fw-bold' : ''" th:text="${errorSpecial} ?: 'Mindestens 1 Sonderzeichen (@#$%^&+=!)'">Mindestens 1 Sonderzeichen (@#$%^&+=!)</li>
                        </ul>
                    </span>
                </div>
                <button type="submit" class="btn btn-custom w-100">Registrieren & Abo wählen</button>
            </form>

            <div class="text-center mt-3 border-top pt-3">
                <p class="small opacity-75">Bereits registriert? <a th:href="@{/login}" class="text-link">Hier einloggen</a></p>
            </div>
        </div>
    </div>
</div>

<!-- Lade Kontakt section -->
<div th:replace="~{site/footer :: Footer}"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/assets/js/index.js}"></script>
<script>
    document.getElementById('toggle-password')?.addEventListener('click', function () {
        const input = document.getElementById('password');
        const icon = this.querySelector('i');
        const isPassword = input.type === 'password';
        input.type = isPassword ? 'text' : 'password';
        icon.classList.toggle('fa-eye');
        icon.classList.toggle('fa-eye-slash');
        this.setAttribute('aria-label', isPassword ? 'Passwort verbergen' : 'Passwort anzeigen');
    });
</script>
</body>
</html>
