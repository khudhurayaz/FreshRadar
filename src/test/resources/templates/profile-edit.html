<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta th:name="${author}" th:content="${authorDescription}">
    <title>Profile ausfüllen</title>
    <link th:href="${cssPath}" rel="stylesheet">
    <link rel="icon" type="image/x-icon" th:href="${appIcon}">
    <link rel="stylesheet" th:href="@{/assets/style/master.css}">
    <link rel="stylesheet" th:href="@{/assets/style/mobile.css}">

    <!-- Externe styles -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="static-nav-page">
<div th:replace="~{site/navigation::Menu(extraClass='navbar-scrolled')}"></div>

<section class="container-xl w-100 subscription">
    <div class="profileEdit">
        <h1 class="mt-8">Profile ausfüllen!</h1>
        <form id="updateProfile" method="post" class="m-3">
            <div class="row">
                <div class="col-6">
                    <label for="inputFirstname" class="form-label">Vorname</label>
                    <input type="text" th:value="${profile != null ? profile.firstname : ''}" class="form-control" id="inputFirstname" aria-describedby="firstnameHelp">
                    <div id="firstnameHelp" class="form-text">Gib deinen Vornamen..</div>
                </div>
                <div class="col-6">
                    <label for="inputLastname" class="form-label">Nachname</label>
                    <input type="text" th:value="${profile != null ? profile.lastname : ''}" class="form-control" id="inputLastname" aria-describedby="lastnameHelp">
                    <div id="lastnameHelp" class="form-text">Gib deinen Nachnamen..</div>
                </div>
            </div>

            <div class="row">
                <div class="col-6">
                    <label for="inputArea" class="form-label">Beruf</label>
                    <input type="text" th:value="${profile != null ? profile.area : ''}" class="form-control" id="inputArea" aria-describedby="inputAreaHelp">
                    <div id="inputAreaHelp" class="form-text">Welche Beruf hast du es?</div>
                </div>
                <div class="col-6">
                    <label for="inputInfo" class="form-label">Info über dich</label>
                    <input type="text" th:value="${profile != null ? profile.info : ''}" class="form-control" id="inputInfo" aria-describedby="infoHelp">
                    <div id="infoHelp" class="form-text">Gib etwas über dich hier ein...</div>
                </div>
            </div>

            <div class="col-12">
                <label for="inputLocation" class="form-label">Wo wohnst du?</label>
                <input type="text" th:value="${profile != null ? profile.location : ''}" class="form-control" id="inputLocation" aria-describedby="locationHelp">
                <div id="locationHelp" class="form-text">Gib deinen Standort...</div>
            </div>
            <div class="imageUpload">
                <label for="logoFile" class="filePlaceholder" id="filePlaceholder">
                    <img th:src="@{${profile.profileImage != null ? profile.profileImage : '/assets/images/placeholder.png'}}"
                         th:alt="${profile.profileImage != null ? 'Profile von ' + profile.firstname + ' ' + profile.lastname : 'Logo hochladen'}">

                    <input type="hidden" name="profileImage"
                           th:value="${profile != null ? profile.profileImage : ''}">

                    <span id="create-project-image-text">Logo anklicken zum Auswählen</span>
                </label>
                <input type="file" id="logoFile" name="projekt_logo" accept=".png, .jpg, .jpeg" style="display: none;">
            </div>
            <div class="row justify-content-between mt-5" >
                <div class="col-6">
                    <button type="submit" class="btn btn-success w-100">Profile aktualisieren</button>
                </div>
                <div class="col-6">
                    <a th:href="@{/profile}" class="btn btn-primary w-100 text-white">
                        Weiter
                    </a>
                </div>
            </div>
        </form>
    </div>
    <div id="alert"></div>
</section>


<!-- Lade Kontakt section -->
<div th:replace="~{/site/footer :: Footer}"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script type="module" th:src="@{/assets/js/profile.js}"></script>
<script th:src="@{/assets/js/index.js}"></script>
</body>
</html>
