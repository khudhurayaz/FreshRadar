<div class="table-responsive showUsers" th:fragment="ShowUsers">
    <h3 class="card-title mb-4">Benutzer</h3>

    <table class="table table-hover align-middle mb-0">
        <thead class="table-light">
        <tr>
            <th scope="col">#</th>
            <th scope="col">Person</th>
            <th scope="col">E-Mail</th>
            <th scope="col">Info</th>
            <th scope="col">Ort</th>
            <th scope="col">Aktion</th>
        </tr>
        </thead>

        <tbody th:if="${profilePage != null and !profilePage.isEmpty()}">
        <tr th:each="profile, stat : ${profilePage.content}"
            th:attr="data-profile-id=${profile.id}">
            <td class="text-muted" th:text="${profile.id}"></td>

            <td>
                <div class="d-flex align-items-center gap-3">
                    <img th:src="@{${profile.profileImage != null ? profile.profileImage : '/assets/images/profile/default/defaultProfile.png'}}"
                         alt="Profilbild"
                         width="56"
                         height="56"
                         class="rounded-circle border shadow-sm object-fit-cover">

                    <div class="w-100">
                        <div class="view-mode">
                            <div class="fw-semibold text-dark profile-fullname"
                                 th:text="${(profile.firstname ?: 'Unknown') + ' ' + (profile.lastname ?: 'Unknown')}"></div>

                            <small class="text-muted profile-area"
                                   th:text="${profile.area ?: ''}"></small>
                        </div>

                        <div class="edit-mode d-none">
                            <div class="row g-2">
                                <div class="col-6">
                                    <input type="text"
                                           class="form-control form-control-sm edit-firstname"
                                           placeholder="Vorname"
                                           th:value="${profile.firstname ?: ''}">
                                </div>
                                <div class="col-6">
                                    <input type="text"
                                           class="form-control form-control-sm edit-lastname"
                                           placeholder="Nachname"
                                           th:value="${profile.lastname ?: ''}">
                                </div>
                                <div class="col-12">
                                    <input type="text"
                                           class="form-control form-control-sm edit-area"
                                           placeholder="Beruf / Bereich"
                                           th:value="${profile.area ?: ''}">
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </td>

            <td>
                <div class="view-mode">
                    <span class="text-dark profile-email"
                          th:text="${profile.user?.email ?: ''}"></span>
                </div>
                <div class="edit-mode d-none">
                    <input type="email"
                           class="form-control form-control-sm edit-email"
                           placeholder="E-Mail"
                           th:value="${profile.user?.email ?: ''}">
                </div>
            </td>

            <td>
                <div class="view-mode">
                    <span class="text-muted profile-info"
                          th:text="${profile.info ?: ''}"></span>
                </div>
                <div class="edit-mode d-none">
                    <input type="text"
                           class="form-control form-control-sm edit-info"
                           placeholder="Info"
                           th:value="${profile.info ?: ''}">
                </div>
            </td>

            <td>
                <div class="view-mode">
                    <span class="text-dark profile-location"
                          th:text="${profile.location ?: ''}"></span>
                </div>
                <div class="edit-mode d-none">
                    <input type="text"
                           class="form-control form-control-sm edit-location"
                           placeholder="Ort"
                           th:value="${profile.location ?: ''}">
                </div>
            </td>

            <td>
                <div class="d-flex flex-wrap gap-2">
                    <button type="button"
                            class="btn btn-primary btn-sm"
                            data-bs-toggle="modal"
                            th:attr="data-bs-target=${'#userModal' + stat.index}">
                        Details
                    </button>

                    <button type="button" class="btn btn-info btn-sm btn-edit-toggle">
                        Ändern
                    </button>

                    <button type="button" class="btn btn-success btn-sm d-none btn-save">
                        Speichern
                    </button>

                    <button type="button" class="btn btn-secondary btn-sm d-none btn-cancel">
                        Abbrechen
                    </button>

                    <button type="button"
                            class="btn btn-danger btn-sm btn-delete"
                            th:attr="data-profile-id=${profile.id},
                                     data-profile-name=${(profile.firstname ?: 'Unknown') + ' ' + (profile.lastname ?: 'Unknown')}">
                        Löschen
                    </button>
                </div>

                <div class="modal fade"
                     th:id="${'userModal' + stat.index}"
                     tabindex="-1"
                     th:attr="aria-labelledby=${'userModalLabel' + stat.index}"
                     aria-hidden="true">
                    <div class="modal-dialog modal-lg modal-dialog-centered">
                        <div class="modal-content">
                            <div class="modal-header">
                                <h5 class="modal-title"
                                    th:id="${'userModalLabel' + stat.index}"
                                    th:text="${(profile.firstname ?: 'Unknown') + ' ' + (profile.lastname ?: 'Unknown') }"
                                    >
                                    Benutzerdetails
                                </h5>
                                <button type="button"
                                        class="btn-close"
                                        data-bs-dismiss="modal"
                                        aria-label="Schließen"></button>
                            </div>

                            <div class="modal-body">
                                <div class="row g-3">
                                    <div class="col-md-4 text-center">
                                        <img th:src="@{${profile.profileImage != null ? profile.profileImage : '/assets/images/profile/default/defaultProfile.png'}}"
                                             alt="Profilbild"
                                             width="120"
                                             height="120"
                                             class="rounded-circle border shadow-sm object-fit-cover mx-auto mb-3">
                                    </div>

                                    <div class="col-md-8">
                                        <div class="mb-2">
                                            <strong>ID:</strong>
                                            <span th:text="${profile.id}"></span>
                                        </div>

                                        <div class="mb-2">
                                            <strong>Vorname:</strong>
                                            <span th:text="${profile.firstname ?: '-'}"></span>
                                        </div>

                                        <div class="mb-2">
                                            <strong>Nachname:</strong>
                                            <span th:text="${profile.lastname ?: '-'}"></span>
                                        </div>

                                        <div class="mb-2">
                                            <strong>E-Mail:</strong>
                                            <span th:text="${profile.user?.email ?: '-'}"></span>
                                        </div>

                                        <div class="mb-2">
                                            <strong>Bereich:</strong>
                                            <span th:text="${profile.area ?: '-'}"></span>
                                        </div>

                                        <div class="mb-2">
                                            <strong>Info:</strong>
                                            <span th:text="${profile.info ?: '-'}"></span>
                                        </div>

                                        <div class="mb-2">
                                            <strong>Ort:</strong>
                                            <span th:text="${profile.location ?: '-'}"></span>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <div class="modal-footer d-flex justify-content-between">
                                <a class="btn btn-primary text-white"
                                   th:if="${profile.user != null}"
                                   th:href="@{/profile/{profileId}(profileId=${profile.user.id})}">
                                    Benutzerseite öffnen
                                </a>

                                <button type="button"
                                        class="btn btn-secondary"
                                        data-bs-dismiss="modal">
                                    Schließen
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </td>
        </tr>
        </tbody>

        <tbody th:if="${profilePage == null or profilePage.isEmpty()}">
        <tr>
            <td colspan="6" class="text-center text-muted py-4">
                Es sind aktuell keine Benutzer vorhanden.
            </td>
        </tr>
        </tbody>
    </table>

    <nav class="my-3"
         aria-label="Benutzer Seiten"
         th:if="${profilePage != null and profilePage.totalPages > 1}">
        <ul class="pagination justify-content-center mb-0">

            <li class="page-item" th:classappend="${profilePage.first} ? ' disabled'">
                <a class="page-link"
                   th:if="${!profilePage.first}"
                   th:href="@{/admin(profilePage=${profilePage.number - 1},
                                    profilePageSize=${profilePage.size},
                                    contactPage=${contactPage.number},
                                    contactPageSize=${contactPage.size},
                                    produktPage=${productPage.number},
                                    produktPageSize=${productPage.size})}">
                    Zurück
                </a>
                <span class="page-link" th:if="${profilePage.first}">Zurück</span>
            </li>

            <li class="page-item"
                th:each="i : ${#numbers.sequence(0, profilePage.totalPages - 1)}"
                th:classappend="${i == profilePage.number} ? ' active'">
                <a class="page-link"
                   th:if="${i != profilePage.number}"
                   th:href="@{/admin(profilePage=${i},
                                    profilePageSize=${profilePage.size},
                                    contactPage=${contactPage.number},
                                    contactPageSize=${contactPage.size},
                                    produktPage=${productPage.number},
                                    produktPageSize=${productPage.size})}"
                   th:text="${i + 1}"></a>
                <span class="page-link"
                      th:if="${i == profilePage.number}"
                      th:text="${i + 1}"></span>
            </li>

            <li class="page-item" th:classappend="${profilePage.last} ? ' disabled'">
                <a class="page-link"
                   th:if="${!profilePage.last}"
                   th:href="@{/admin(profilePage=${profilePage.number + 1},
                                    profilePageSize=${profilePage.size},
                                    contactPage=${contactPage.number},
                                    contactPageSize=${contactPage.size},
                                    produktPage=${productPage.number},
                                    produktPageSize=${productPage.size})}">
                    Weiter
                </a>
                <span class="page-link" th:if="${profilePage.last}">Weiter</span>
            </li>

        </ul>
    </nav>
</div>
