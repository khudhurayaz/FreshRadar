# Datenbankverbindung
spring.datasource.url=${database_url}
spring.datasource.username=${database_username}
spring.datasource.password=${database_password}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Server einstellungen
app.upload.dir=./uploads/profile/
#Linux
# app.upload.dir=/opt/freshradar/uploads/profile/

server.servlet.context-path=/
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# timeout für eingeloggte benutzer
server.servlet.session.timeout=60m

# JPA und Hibernate (Datenbank-Steuerung)
# update: Vergleicht mein Java-Entity-Klassen mit der Datenbank.
# Gibt es neue Felder oder Tabellen, werden diese hinzugefügt.
# Bestehende Daten bleiben erhalten. (Ideal für die Entwicklung).
# create: Löscht bei jedem Start alle Tabellen und legt sie komplett neu an.
# Alle Daten gehen verloren.
# create-drop: Wie create, löscht die Tabellen aber zusätzlich auch wieder,
# wenn die Anwendung gestoppt wird.
# none: Es werden keine Änderungen an der Datenbankstruktur vorgenommen.
# (Pflicht für den Live-Betrieb/Produktion).
spring.jpa.hibernate.ddl-auto=update

# Logs anzeigen
logging.level.de.khudhurayaz.freshradar=DEBUG
logging.level.org.springframework.security=DEBUG

#Zeigt bei Fehlern einer Fehlerseite
spring.web.error.whitelabel.enabled=true
spring.web.error.path=/error