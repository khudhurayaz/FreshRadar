<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta th:name="${author}" th:content="${authorDescription}">
    <title th:text="${appName + ' | Login'}"></title>
    <link th:href="${cssPath}" rel="stylesheet">
    <link rel="icon" type="image/x-icon" th:href="${appIcon}">
    <link rel="stylesheet" th:href="@{/assets/style/master.css}">
    <link rel="stylesheet" th:href="@{/assets/style/mobile.css}">

    <!-- Externe styles -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="static-nav-page">
<div th:replace="~{site/navigation::Menu(extraClass='navbar-scrolled')}"></div>

<section class="container-xl w-100 subscription">

    <div th:replace="~{site/price :: Price(isSelectionPage=true)}"></div>

    <br>
    <form th:action="@{/logout}" method="post">
        <button type="submit" class="btn btn-danger">Abbrechen & Logout</button>
    </form>

    <p class="table-note"><i class="fa-solid fa-shield-halved me-1 text-cyan"></i> Jederzeit kündbar. Keine versteckten Kosten. Datenhaltung verschlüsselt nach DSGVO.</p>
</section>


<!-- Lade Kontakt section -->
<div th:replace="~{site/footer :: Footer}"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/assets/js/index.js}"></script>
</body>
</html>
